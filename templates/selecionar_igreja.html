{% extends "base.html" %}
{% block title %}Selecionar Igreja{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">

    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⛪</div>
      <h1 class="text-2xl font-bold text-verde-escuro">
        Selecione a Igreja
      </h1>
      <p class="text-gray-500 text-sm mt-1">
        Olá, {{ current_user.nome }}! Escolha qual igreja acessar.
      </p>
    </div>

    <form method="POST" action="/selecionar-igreja" class="flex flex-col gap-3">
      {% for igreja in igrejas %}
        <button
          type="submit"
          name="igreja_id"
          value="{{ igreja.igreja_id }}"
          class="w-full text-left px-5 py-4 border-2 border-gray-200
                 rounded-xl hover:border-verde-claro hover:bg-gray-50
                 transition flex items-center justify-between">
          <div>
            <div class="font-semibold text-gray-700">{{ igreja.igreja_nome }}</div>
            <div class="text-sm text-gray-400 mt-0.5">{{ igreja.perfil }}</div>
          </div>
          <span class="text-verde-escuro">→</span>
        </button>
      {% endfor %}
    </form>

    <div class="mt-6 text-center">
      <a href="/logout" class="text-sm text-gray-400 hover:text-gray-600 transition">
        Sair
      </a>
    </div>

  </div>
</div>
{% endblock %}
