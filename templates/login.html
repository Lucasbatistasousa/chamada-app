{% extends "base.html" %}
{% block title %}Login — Escola de Líderes{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">

    <!-- Cabeçalho -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🏫</div>
      <h1 class="text-2xl font-bold text-verde-escuro">Escola de Líderes</h1>
      <p class="text-gray-500 text-sm mt-1">Faça login para continuar</p>
    </div>

    <!-- Formulário -->
    <form method="POST" action="" class="flex flex-col gap-4">

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">
          Email
        </label>
        <input
          type="email"
          name="email"
          required
          placeholder="seu@email.com"
          class="w-full border border-gray-300 rounded-lg px-4 py-2
                 focus:outline-none focus:ring-2 focus:ring-verde-claro text-sm"
        >
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">
          Senha
        </label>
        <div class="relative">
          <input
            type="password"
            name="senha"
            id="senha"
            required
            placeholder="••••••••"
            class="w-full border border-gray-300 rounded-lg px-4 py-2
                   focus:outline-none focus:ring-2 focus:ring-verde-claro text-sm pr-10"
          >
          <button type="button" onclick="toggleSenha()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400
                         hover:text-gray-600 transition">
            <span id="icon-senha">👁️</span>
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="bg-verde-escuro text-white py-2 rounded-lg font-semibold
               hover:bg-opacity-90 transition mt-2">
        Entrar
      </button>

    </form>

  </div>
</div>

<script>
    function toggleSenha() {
      const input = document.getElementById('senha');
      const icon  = document.getElementById('icon-senha');

      if (input.type === 'password') {
        input.type       = 'text';
        icon.textContent = '🙈';
      } else {
        input.type       = 'password';
        icon.textContent = '👁️';
      }
    }
  </script>
{% endblock %}
