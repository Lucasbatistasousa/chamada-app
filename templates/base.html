<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Chamada Digital{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f0f0f;
      --paper: #faf8f4;
      --cream: #f0ece3;
      --accent: #c8533a;
      --accent-dark: #a33f29;
      --green: #2d7a4f;
      --red: #c8533a;
      --muted: #7a7060;
      --border: #d8d2c5;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--paper);
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; gap: 0.25rem; margin-left: auto; }
    .nav-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.375rem 0.875rem;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--paper); background: rgba(255,255,255,0.1); }

    /* ── LAYOUT ── */
    .page { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .page-header { margin-bottom: 2rem; }
    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.2;
    }
    .page-sub { color: var(--muted); margin-top: 0.375rem; font-size: 0.9375rem; }

    /* ── CARDS ── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1.125rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--ink); color: #fff; }
    .btn-primary:hover { background: #2a2a2a; transform: translateY(-1px); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--ink); background: var(--cream); }
    .btn-danger { background: transparent; color: var(--red); border: 1.5px solid #f0c4bb; font-weight: 500; }
    .btn-danger:hover { background: #fdf0ed; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.8125rem; }

    /* ── INPUTS ── */
    .input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      background: var(--paper);
      transition: border-color 0.15s;
      outline: none;
    }
    .input:focus { border-color: var(--ink); }
    label { font-size: 0.8125rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 0.4rem; }

    /* ── BADGES ── */
    .badge {
      display: inline-block; padding: 0.2rem 0.6rem;
      border-radius: 99px; font-size: 0.75rem; font-weight: 600;
    }
    .badge-green { background: #dcf0e5; color: var(--green); }
    .badge-red { background: #fde8e3; color: var(--red); }
    .badge-gray { background: var(--cream); color: var(--muted); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--ink); color: #fff;
      padding: 0.75rem 1.25rem; border-radius: 10px;
      font-size: 0.875rem; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      opacity: 0; transform: translateY(8px);
      transition: all 0.25s; pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── MODAL ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
      z-index: 200; align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px;
      padding: 2rem; width: 100%; max-width: 420px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      animation: pop 0.2s ease;
    }
    @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.375rem; margin-bottom: 1.25rem; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; justify-content: flex-end; }

    /* ── DIVIDER ── */
    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .flex { display: flex; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-3 { margin-top: 0.75rem; }
    .w-full { width: 100%; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">Chamada<span>.</span></a>
    <div class="nav-links">
      <a href="/" class="{% if request.path == '/' %}active{% endif %}">Turmas</a>
      <a href="/historico" class="{% if '/historico' in request.path %}active{% endif %}">Histórico</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <div id="toast"></div>

  <script>
    function toast(msg, duration = 2800) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
